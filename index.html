<!DOCTYPE html>
<html>
<head>
    <title>我的炫酷主页 😎</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(270deg, #0f2027, #2c5364, #00c6ff);
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;

            font-family: Arial, sans-serif;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            padding: 40px;
            border-radius: 20px;
            text-align: center;

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);

            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: white;
            color: black;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>你好，我是🐇·斯万 👋</h1>
        <p>这是我的第一个炫酷网页</p>
        <button onclick="sayHi()">点我</button>
    </div>

    <script>
        function sayHi() {
            alert("欢迎来到我的网页 😄");
        }
    </script>

</body>
</html>
